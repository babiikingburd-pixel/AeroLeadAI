name: Build Relay APK

on:
  push:
    branches: [main]
    paths:
      - 'relay_app/**'
      - '.github/workflows/build-relay-apk.yml'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get
        working-directory: relay_app

      - name: Build release APK
        run: flutter build apk --release
        working-directory: relay_app

      - name: Publish release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: relay-app-latest
          name: Relay App (latest build)
          body: |
            Automatically built from commit ${{ github.sha }}.
          files: relay_app/build/app/outputs/flutter-apk/app-release.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
